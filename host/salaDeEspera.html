<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Sala de Espera</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-12 col-md-10 col-lg-7">
            <h2 class="text-center mb-4">Sala de Espera</h2>

            <div class="card mb-3">
                <div class="card-body">
                    <p><strong>Código da sala:</strong> <span id="roomCode">...</span></p>
                    <p><strong>Status:</strong> <span id="roomStatus">Aguardando conexão...</span></p>
                </div>
            </div>

            <div class="card mb-3">
                <div class="card-body">
                    <h5>Jogadores conectados</h5>
                    <ul id="playerList" class="list-group"></ul>
                </div>
            </div>

            <button id="startButton" class="btn btn-primary w-100 mb-3" onclick="sendStartRound()" disabled>
                Iniciar rodada
            </button>

            <div id="message" class="text-center text-danger"></div>
        </div>
    </div>
</div>

<script src="js/salaDeEspera.js"></script>
</body>
</html>
