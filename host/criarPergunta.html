<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Criar Quiz</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- CSS local -->
<link rel="stylesheet" href="css/criarPergunta.css">

</head>

<body>

<div class="container py-4">

    <div class="row justify-content-center">
        <div class="col-12 col-md-10 col-lg-7">

            <h2 class="text-center text-white mb-4">
                Criador de Quiz
            </h2>

            <div id="questionsContainer"></div>

            <button class="btn btn-primary w-100 mt-3 py-2" onclick="createQuestion()">
                + Nova pergunta
            </button>

            <button class="btn btn-success w-100 mt-2 py-2" onclick="exportJSON()">
                Exportar JSON
            </button>

        </div>
    </div>

</div>

<!-- JS local -->
<script src="js/criarPergunta.js"></script>

</body>
</html>
