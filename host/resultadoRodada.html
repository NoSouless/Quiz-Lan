<!DOCTYPE html>
<html lang="pt-br">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Resultado da Rodada</title>

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" href="css/resultadoRodada.css">
</head>
<body>

<div class="container py-4">
	<div class="row justify-content-center">
		<div class="col-12 col-md-10 col-lg-7">
			<div class="resultado-container shadow">
				<h2 class="mb-2">Resultado da Rodada</h2>
				<p id="roundInfo" class="round-info mb-3">Rodada -/-</p>
				<p id="statusText" class="status-text">Esperando os Jogadores responderem...</p>

				<div class="d-grid gap-2 mt-4">
					<button id="btnEncerrarRodada" class="btn btn-warning">Encerrar rodada</button>
					<button id="btnProximaRodada" class="btn btn-primary" disabled>Iniciar Próxima Rodada</button>
					<button id="btnEncerrarJogo" class="btn btn-danger">Encerrar Jogo</button>
				</div>
			</div>
		</div>
	</div>
</div>

<script src="js/resultadoRodada.js"></script>

</body>
</html>
