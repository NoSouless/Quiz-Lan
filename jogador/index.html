<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar em um Jogo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #46178f, #6c2bd9);
        }
    </style>
</head>
<body>
    <div class="d-flex justify-content-center align-items-center align-items-sm-start vh-100">
        <div class="container py-4">
            <div class="row justify-content-center">
                <div class="col-12 col-md-10 col-lg-4">
                    <h2 class="text-center text-white mb-4">Entrar Em Uma Sala</h2>
                    <div class="card">
                        <div class="card-body">
                            <label for="roomCodeInput" class="form-label">Código da Sala</label>
                            <input type="text" id="codigoSalaInput" class="form-control mb-3" placeholder="Digite o código da sala">
                            <label for="playerNameInput" class="form-label">Nome do Jogador</label>
                            <input type="text" id="nomeJogadorInput" class="form-control mb-2" placeholder="Digite seu nome">
                            <div id="message" class="text-center text-danger"></div>
                            <button class="btn btn-primary w-100 mt-2 py-2" id="entrarBtn" disabled>Entrar</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/index.js"></script>
</body>
</html>
