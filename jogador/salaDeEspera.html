<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sala de Espera</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #46178f, #6c2bd9);
        }
    </style>
</head>
<body>
    <div class="d-flex justify-content-center align-items-center align-items-sm-start vh-100">
        <div class="container py-4">
            <div class="row justify-content-center">
                <div class="col-12 col-md-10 col-lg-4">
                    <h2 class="text-center text-white mb-4">Esperando para iniciar a rodada...</h2>
                </div>
            </div>
        </div>
    </div>
</body>

<script>
    ws = new WebSocket("ws://localhost:8765");
    ws.onerror = (error) => {
        console.error("Erro ao conectar ao WebSocket:", error);
        return false;
    };
    ws.onopen = () => {
        console.log("Conectado ao WebSocket");
        console.log(sessionStorage.getItem("quizRoomCode"), sessionStorage.getItem("quizPlayerName"));
        ws.send(JSON.stringify({
            "type": "rejoin_room",
            "code": sessionStorage.getItem("quizRoomCode"),
            "name": sessionStorage.getItem("quizPlayerName")
        }));
    };

    ws.onmessage = (event) => {
            try {
                console.log(event.data);
                const data = JSON.parse(event.data);
                handleServerMessage(data);
            } catch (err) {
                console.error("Mensagem inválida do servidor", err);
            }
        };

    function handleServerMessage(data) {
        switch(data.type) {
            case "round_started":
                sessionStorage.setItem("roundData", JSON.stringify(data));
                console.log(data);
                window.location.href = "jogarRodada.html";
                break;
            case "rejoined_room":
                console.log("Reconectado à sala:", data);
                break;
             case "error":
                alert(data.message || "Erro desconhecido.");
                break;
        }
    }
</script>
</html>
