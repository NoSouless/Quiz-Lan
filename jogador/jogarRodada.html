<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Jogar Rodada</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/jogarRodada.css">
</head>
<body>

<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-12 col-md-10 col-lg-7">
            
            <div class="rodada-container shadow">
                <div class="timer-bar"></div>
                <h5 class="text-dark" id="rodadaAtual">1/10</h5>
                <h2 class="pergunta-texto mt-3">Qual a capital da França?</h2>
                
                <div class="alternativas-grid">
                    <button class="alternativa-btn" style="--cor-alt: #e21b3c;">
                        <span class="forma-icon">▲</span> 
                    </button>
                    <button class="alternativa-btn" style="--cor-alt: #1368ce;">
                        <span class="forma-icon">♦</span>
                    </button>
                    <button class="alternativa-btn" style="--cor-alt: #d89e00;">
                        <span class="forma-icon">●</span>
                    </button>
                    <button class="alternativa-btn" style="--cor-alt: #26890c;">
                        <span class="forma-icon">■</span>
                    </button>
                </div>
            </div>

        </div>
    </div>
</div>

<script src="js/jogarRodada.js"></script>
<script>
    window.addEventListener("load", () => {
        const roundData = JSON.parse(sessionStorage.getItem("roundData"));
        if (!roundData) {
            alert("Dados da rodada não encontrados. Retornando para a sala de espera.");
            window.location.href = "salaDeEspera.html";
            return;
        }

        const startTime = Date.now();
        const endTime = startTime + roundData.roundDurationMs;

        document.querySelector(".pergunta-texto").textContent = roundData.quiz[roundData.indexRound].question;
        document.getElementById("rodadaAtual").textContent = `${roundData.round}/${roundData.totalRounds}`;
        const alternativas = roundData.quiz[roundData.indexRound].options;
        const buttons = document.querySelectorAll(".alternativa-btn");
        buttons.forEach((btn, idx) => {
            if (idx >= alternativas.length) {
                btn.style.display = "none"; // Esconde botões extras
                return;
            }
            btn.querySelector(".forma-icon").textContent = alternativas[idx];
            btn.onclick = () => {
                if(btn.disabled || btn.classList.contains("selected")) return;
                const elapsedTime = Date.now() - startTime;
                const remainingTime = Math.max(0, roundData.roundDurationMs - elapsedTime);

                ws.send(JSON.stringify({
                    type: "submit_answer",
                    code: roundData.code,
                    name: sessionStorage.getItem("quizPlayerName"),
                    answer: idx,
                    remainingTime: remainingTime,
                }));

                buttons.forEach(b => {
                    if (b !== btn) {
                        b.disabled = true;
                    } else {
                        b.classList.add("selected");
                    }
                }); // Desabilita botões após resposta
                
                // window.location.href = "salaDeEspera.html";
            };
        });

        const timerBar = document.querySelector('.timer-bar');
        if (!timerBar) return;

        timerBar.style.animationDuration = `${roundData.roundDurationMs / 1000}s`;

        timerBar.addEventListener('animationend', (e) => {
            buttons.forEach(function(btn, idx) {
                const texto = btn.querySelector(".forma-icon");
                const icon = idx == roundData.quiz[roundData.indexRound].correct ? "✓" : "✗";
                texto.textContent = texto.textContent + ` ${icon}`;
            });

            // if(roundData.round < roundData.totalRounds) {
            //     roundData.indexRound++;
            //     roundData.round++;
            //     sessionStorage.setItem("roundData", JSON.stringify(roundData));
            //     // window.location.href = "jogarRodada.html";
            // } else {
            //     sessionStorage.removeItem("roundData");
            //     // window.location.href = "colocacaoFinal.html";
            // }
        });

        ws = new WebSocket("ws://localhost:8765");
        ws.onerror = (error) => {
            console.error("Erro ao conectar ao WebSocket:", error);
            return false;
        };
        ws.onopen = () => {
            console.log("Conectado ao WebSocket");
            console.log(sessionStorage.getItem("quizRoomCode"), sessionStorage.getItem("quizPlayerName"));
            ws.send(JSON.stringify({
                "type": "rejoin_room",
                "code": sessionStorage.getItem("quizRoomCode"),
                "name": sessionStorage.getItem("quizPlayerName")
            }));
        };

        ws.onmessage = (event) => {
            try {
                console.log(event.data);
                const data = JSON.parse(event.data);
                handleServerMessage(data);
            } catch (err) {
                console.error("Mensagem inválida do servidor", err);
            }
        };

        function handleServerMessage(data) {
            switch(data.type) {
                case "round_started":
                    sessionStorage.setItem("roundData", JSON.stringify(data));
                    console.log(data);
                    // window.location.href = "jogarRodada.html";
                    break;
                case "rejoined_room":
                    console.log("Reconectado à sala:", data);
                    break;
                case "player_answer":
                    console.log("Resposta:", data);
                    break;
                case "round_ended":
                    console.log("Rodada encerrada:", data);
                    if(roundData.round < roundData.totalRounds) {
                        sessionStorage.setItem("roundData", JSON.stringify(data));
                        window.location.href = "salaDeEspera.html";
                    } else {
                        sessionStorage.removeItem("roundData");
                        window.location.href = "colocacaoFinal.html";
                    }
                    break;
                case "error":
                    alert(data.message || "Erro desconhecido.");
                    break;
            }
        }
    })
</script>

</body>
</html>
